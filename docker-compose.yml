services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verdure
      POSTGRES_PASSWORD: verdure
      POSTGRES_DB: verdure
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://verdure:verdure@postgres:5432/verdure
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      SECRET_KEY: dev-secret-change-me
      TOKEN_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/integrations/google/oauth/callback}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    command: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://verdure:verdure@postgres:5432/verdure
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q verdure,verdure_scheduler
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://verdure:verdure@postgres:5432/verdure
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      SECRET_KEY: dev-secret-change-me
      TOKEN_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/integrations/google/oauth/callback}
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -lc "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app

volumes:
  pgdata:
